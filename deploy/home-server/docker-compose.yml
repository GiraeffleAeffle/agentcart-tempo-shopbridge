services:
  agentcart:
    build: ${AGENTCART_CONTEXT:-../../gateway}
    restart: unless-stopped
    depends_on:
      - vikunja
    ports:
      - "${AGENTCART_HOST_BIND:-127.0.0.1}:${AGENTCART_HOST_PORT:-8099}:8099"
    environment:
      AGENTCART_BIND: 0.0.0.0
      AGENTCART_PORT: 8099
      AGENTCART_PUBLIC_URL: ${AGENTCART_PUBLIC_URL:-http://localhost:8099}
      AGENTCART_TIMEZONE: ${AGENTCART_TIMEZONE:-Europe/Berlin}
      AGENTCART_TOKEN: ${AGENTCART_TOKEN:?set AGENTCART_TOKEN}
      AGENTCART_DATA_DIR: /data
      AGENTCART_REGISTRY_SUBMIT_TOKEN: ${AGENTCART_REGISTRY_SUBMIT_TOKEN:?set AGENTCART_REGISTRY_SUBMIT_TOKEN}
      AGENTCART_DEFAULT_SHIP_COUNTRY: ${AGENTCART_DEFAULT_SHIP_COUNTRY:-DE}
      AGENTCART_DEFAULT_SHIP_POSTAL_CODE: ${AGENTCART_DEFAULT_SHIP_POSTAL_CODE:-10115}
      AGENTCART_DELIVERY_CALENDAR_ENABLED: ${AGENTCART_DELIVERY_CALENDAR_ENABLED:-true}
      AGENTCART_DELIVERY_CALENDAR_TOKEN: ${AGENTCART_DELIVERY_CALENDAR_TOKEN:?set AGENTCART_DELIVERY_CALENDAR_TOKEN}
      WOOCOMMERCE_MODE: ${WOOCOMMERCE_MODE:-disabled}
      WOOCOMMERCE_BASE_URL: ${WOOCOMMERCE_BASE_URL:-}
      WOOCOMMERCE_AGENTCART_TOKEN: ${WOOCOMMERCE_AGENTCART_TOKEN:-}
      WOOCOMMERCE_SIGNED_REQUEST_SECRET: ${WOOCOMMERCE_SIGNED_REQUEST_SECRET:-}
      WOOCOMMERCE_SIGNED_REQUEST_PRIVATE_KEY: ${WOOCOMMERCE_SIGNED_REQUEST_PRIVATE_KEY:-}
      WOOCOMMERCE_SIGNED_REQUEST_SIGNER: ${WOOCOMMERCE_SIGNED_REQUEST_SIGNER:-agentcart-service}
      WOOCOMMERCE_MERCHANT_ID: ${WOOCOMMERCE_MERCHANT_ID:-woocommerce-demo-shop}
      WOOCOMMERCE_MERCHANT_NAME: ${WOOCOMMERCE_MERCHANT_NAME:-AgentCart Demo Shop}
      AGENTCART_MERCHANT_REGISTRY_PATH: ${AGENTCART_MERCHANT_REGISTRY_PATH:-}
      AGENTCART_MERCHANT_REGISTRY_URL: ${AGENTCART_MERCHANT_REGISTRY_URL:-}
      AGENTCART_MERCHANT_REGISTRY_HMAC_SECRET: ${AGENTCART_MERCHANT_REGISTRY_HMAC_SECRET:-}
      AGENTCART_REQUIRE_VERIFIED_REGISTRY: ${AGENTCART_REQUIRE_VERIFIED_REGISTRY:-true}
      AGENTCART_MERCHANT_REGISTRY_MAX_AGE_DAYS: ${AGENTCART_MERCHANT_REGISTRY_MAX_AGE_DAYS:-180}
      AGENTCART_REGISTRY_MONITOR_INTERVAL_SECONDS: ${AGENTCART_REGISTRY_MONITOR_INTERVAL_SECONDS:-0}
      AGENTCART_REGISTRY_MONITOR_HISTORY_LIMIT: ${AGENTCART_REGISTRY_MONITOR_HISTORY_LIMIT:-50}
      AGENTCART_REGISTRY_ALERT_WEBHOOK_URL: ${AGENTCART_REGISTRY_ALERT_WEBHOOK_URL:-}
      AGENTCART_REGISTRY_ALERT_WEBHOOK_TOKEN: ${AGENTCART_REGISTRY_ALERT_WEBHOOK_TOKEN:-}
      AGENTCART_REGISTRY_ALERT_HOMEASSISTANT_ENABLED: ${AGENTCART_REGISTRY_ALERT_HOMEASSISTANT_ENABLED:-false}
      AGENTCART_REGISTRY_ALERT_EMAIL_TO: ${AGENTCART_REGISTRY_ALERT_EMAIL_TO:-}
      AGENTCART_REGISTRY_ALERT_EMAIL_FROM: ${AGENTCART_REGISTRY_ALERT_EMAIL_FROM:-}
      AGENTCART_REGISTRY_ALERT_SMTP_HOST: ${AGENTCART_REGISTRY_ALERT_SMTP_HOST:-}
      AGENTCART_REGISTRY_ALERT_SMTP_PORT: ${AGENTCART_REGISTRY_ALERT_SMTP_PORT:-587}
      AGENTCART_REGISTRY_ALERT_SMTP_USERNAME: ${AGENTCART_REGISTRY_ALERT_SMTP_USERNAME:-}
      AGENTCART_REGISTRY_ALERT_SMTP_PASSWORD: ${AGENTCART_REGISTRY_ALERT_SMTP_PASSWORD:-}
      AGENTCART_REGISTRY_ALERT_SMTP_STARTTLS: ${AGENTCART_REGISTRY_ALERT_SMTP_STARTTLS:-true}
      AGENTCART_REGISTRY_ALERT_MIN_SEVERITY: ${AGENTCART_REGISTRY_ALERT_MIN_SEVERITY:-warning}
      AGENTCART_REGISTRY_ALERT_INCLUDE_RESOLVED: ${AGENTCART_REGISTRY_ALERT_INCLUDE_RESOLVED:-true}
      AGENTCART_VERIFIER_ALERT_WEBHOOK_URL: ${AGENTCART_VERIFIER_ALERT_WEBHOOK_URL:-}
      AGENTCART_VERIFIER_ALERT_WEBHOOK_TOKEN: ${AGENTCART_VERIFIER_ALERT_WEBHOOK_TOKEN:-}
      AGENTCART_VERIFIER_ALERT_MIN_SEVERITY: ${AGENTCART_VERIFIER_ALERT_MIN_SEVERITY:-warning}
      AGENTCART_VERIFIER_ALERT_THROTTLE_SECONDS: ${AGENTCART_VERIFIER_ALERT_THROTTLE_SECONDS:-300}
      AGENTCART_VERIFIER_REPLAY_STORE_DRIVER: ${AGENTCART_VERIFIER_REPLAY_STORE_DRIVER:-json}
      AGENTCART_VERIFIER_REPLAY_STORE_PATH: ${AGENTCART_VERIFIER_REPLAY_STORE_PATH:-/data/verifier/replay-store.json}
      AGENTCART_VERIFIER_REQUIRE_DURABLE_REPLAY: ${AGENTCART_VERIFIER_REQUIRE_DURABLE_REPLAY:-true}
      AGENTCART_VERIFIER_REPLAY_LOCK_TIMEOUT_MS: ${AGENTCART_VERIFIER_REPLAY_LOCK_TIMEOUT_MS:-5000}
      AGENTCART_VERIFIER_REPLAY_JOURNAL_PATH: ${AGENTCART_VERIFIER_REPLAY_JOURNAL_PATH:-/data/verifier/replay-journal.jsonl}
      AGENTCART_VERIFIER_REQUIRE_REPLAY_JOURNAL: ${AGENTCART_VERIFIER_REQUIRE_REPLAY_JOURNAL:-false}
      AGENTCART_OPS_EVENT_WEBHOOK_URL: ${AGENTCART_OPS_EVENT_WEBHOOK_URL:-}
      AGENTCART_OPS_EVENT_WEBHOOK_TOKEN: ${AGENTCART_OPS_EVENT_WEBHOOK_TOKEN:-}
      AGENTCART_OPS_EVENT_HOMEASSISTANT_ENABLED: ${AGENTCART_OPS_EVENT_HOMEASSISTANT_ENABLED:-false}
      AGENTCART_OPS_EVENT_EMAIL_TO: ${AGENTCART_OPS_EVENT_EMAIL_TO:-}
      AGENTCART_OPS_EVENT_EMAIL_FROM: ${AGENTCART_OPS_EVENT_EMAIL_FROM:-}
      AGENTCART_OPS_EVENT_SMTP_HOST: ${AGENTCART_OPS_EVENT_SMTP_HOST:-}
      AGENTCART_OPS_EVENT_SMTP_PORT: ${AGENTCART_OPS_EVENT_SMTP_PORT:-587}
      AGENTCART_OPS_EVENT_SMTP_USERNAME: ${AGENTCART_OPS_EVENT_SMTP_USERNAME:-}
      AGENTCART_OPS_EVENT_SMTP_PASSWORD: ${AGENTCART_OPS_EVENT_SMTP_PASSWORD:-}
      AGENTCART_OPS_EVENT_SMTP_STARTTLS: ${AGENTCART_OPS_EVENT_SMTP_STARTTLS:-true}
      AGENTCART_OPS_EVENT_MIN_SEVERITY: ${AGENTCART_OPS_EVENT_MIN_SEVERITY:-warning}
      HOMEASSISTANT_URL: ${HOMEASSISTANT_URL:-}
      HOMEASSISTANT_TOKEN: ${HOMEASSISTANT_TOKEN:-}
      HA_NOTIFY_SERVICES: ${HA_NOTIFY_SERVICES:-}
      VIKUNJA_API_URL: http://vikunja:3456/api/v1
      VIKUNJA_WEB_URL: ${VIKUNJA_WEB_URL:-http://localhost:3456}
      VIKUNJA_TOKEN: ${VIKUNJA_TOKEN:-}
      VIKUNJA_PROJECT_ID: ${VIKUNJA_PROJECT_ID:-}
    volumes:
      - agentcart_data:/data

  household-os:
    build: ${HOUSEHOLD_OS_CONTEXT:-../../household-os}
    restart: unless-stopped
    depends_on:
      - vikunja
      - agentcart
    ports:
      - "${HOUSEHOLD_OS_HOST_BIND:-127.0.0.1}:${HOUSEHOLD_OS_HOST_PORT:-8088}:8088"
    environment:
      HOUSEHOLD_OS_BIND: 0.0.0.0
      HOUSEHOLD_OS_PORT: 8088
      HOUSEHOLD_OS_TOKEN: ${HOUSEHOLD_OS_TOKEN:?set HOUSEHOLD_OS_TOKEN}
      AUDIT_LOG_PATH: /data/audit.jsonl
      CHAT_HISTORY_PATH: /data/chat.jsonl
      SESSION_PATH: /data/sessions.json
      VIKUNJA_API_URL: http://vikunja:3456/api/v1
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL:-http://localhost:3456}
      VIKUNJA_WEB_URL: ${VIKUNJA_WEB_URL:-http://localhost:3456}
      VIKUNJA_TOKEN: ${VIKUNJA_TOKEN:-}
      HOMEASSISTANT_URL: ${HOMEASSISTANT_URL:-}
      HOMEASSISTANT_TOKEN: ${HOMEASSISTANT_TOKEN:-}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      AGENTCART_URL: http://agentcart:8099
      AGENTCART_TOKEN: ${AGENTCART_TOKEN:?set AGENTCART_TOKEN}
      HA_NOTIFY_SERVICES: ${HA_NOTIFY_SERVICES:-}
    volumes:
      - household_os_data:/data

  vikunja-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vikunja}
      POSTGRES_USER: ${POSTGRES_USER:-vikunja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - vikunja_db:/var/lib/postgresql/data

  vikunja:
    image: vikunja/vikunja:2.3.0
    restart: unless-stopped
    depends_on:
      - vikunja-db
    ports:
      - "${VIKUNJA_HOST_BIND:-127.0.0.1}:${VIKUNJA_HOST_PORT:-3456}:3456"
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL:-http://localhost:3456}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET:?set VIKUNJA_SERVICE_SECRET}
      VIKUNJA_SERVICE_TIMEZONE: ${AGENTCART_TIMEZONE:-Europe/Berlin}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: vikunja-db
      VIKUNJA_DATABASE_DATABASE: ${POSTGRES_DB:-vikunja}
      VIKUNJA_DATABASE_USER: ${POSTGRES_USER:-vikunja}
      VIKUNJA_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - vikunja_files:/app/vikunja/files

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    profiles: ["homeassistant"]
    restart: unless-stopped
    ports:
      - "${HOME_ASSISTANT_HOST_BIND:-127.0.0.1}:${HOME_ASSISTANT_HOST_PORT:-8123}:8123"
    environment:
      TZ: ${AGENTCART_TIMEZONE:-Europe/Berlin}
    volumes:
      - homeassistant_config:/config

  woocommerce-db:
    image: mariadb:11
    profiles: ["woocommerce-demo"]
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WOO_DB_PASSWORD:?set WOO_DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - woocommerce_db:/var/lib/mysql

  woocommerce:
    image: wordpress:php8.2-apache
    profiles: ["woocommerce-demo"]
    restart: unless-stopped
    depends_on:
      - woocommerce-db
    ports:
      - "${WOO_HOST_BIND:-127.0.0.1}:${WOO_HOST_PORT:-8098}:80"
    environment:
      WORDPRESS_DB_HOST: woocommerce-db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WOO_DB_PASSWORD:?set WOO_DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('AGENTCART_SHOPBRIDGE_TOKEN', getenv('AGENTCART_SHOPBRIDGE_TOKEN') ?: '');
        define('AGENTCART_MERCHANT_ID', getenv('AGENTCART_MERCHANT_ID') ?: 'woocommerce-demo-shop');
        define('AGENTCART_TEMPO_NETWORK', getenv('AGENTCART_TEMPO_NETWORK') ?: 'testnet');
        define('AGENTCART_TEMPO_RECIPIENT_ADDRESS', getenv('AGENTCART_TEMPO_RECIPIENT_ADDRESS') ?: '');
        define('AGENTCART_STRIPE_PROFILE_ID', getenv('AGENTCART_STRIPE_PROFILE_ID') ?: '');
        define('AGENTCART_PAYMENT_VERIFIER_URL', getenv('AGENTCART_PAYMENT_VERIFIER_URL') ?: '');
        define('AGENTCART_PAYMENT_VERIFIER_TOKEN', getenv('AGENTCART_PAYMENT_VERIFIER_TOKEN') ?: '');
        define('AGENTCART_CHECKOUT_MODE', getenv('AGENTCART_CHECKOUT_MODE') ?: 'trusted_token_or_verifier');
        define('AGENTCART_SIGNED_REQUEST_MODE', getenv('AGENTCART_SIGNED_REQUEST_MODE') ?: 'off');
        define('AGENTCART_SIGNED_REQUEST_SECRET', getenv('AGENTCART_SIGNED_REQUEST_SECRET') ?: '');
        define('AGENTCART_SIGNED_REQUEST_PUBLIC_KEY', getenv('AGENTCART_SIGNED_REQUEST_PUBLIC_KEY') ?: '');
        define('AGENTCART_SUPPORT_EMAIL', getenv('AGENTCART_SUPPORT_EMAIL') ?: '');
        define('AGENTCART_RETURNS_URL', getenv('AGENTCART_RETURNS_URL') ?: '');
        define('AGENTCART_SUBSTITUTION_POLICY', getenv('AGENTCART_SUBSTITUTION_POLICY') ?: 'approval_required');
        define('AGENTCART_CANCELLATION_WINDOW_MINUTES', getenv('AGENTCART_CANCELLATION_WINDOW_MINUTES') ?: 30);
      AGENTCART_SHOPBRIDGE_TOKEN: ${WOOCOMMERCE_AGENTCART_TOKEN:?set WOOCOMMERCE_AGENTCART_TOKEN}
      AGENTCART_MERCHANT_ID: ${WOOCOMMERCE_MERCHANT_ID:-woocommerce-demo-shop}
      AGENTCART_MERCHANT_NAME: ${WOOCOMMERCE_MERCHANT_NAME:-AgentCart Demo Shop}
      AGENTCART_SUPPORT_EMAIL: ${WOO_ADMIN_EMAIL:-merchant@example.com}
      AGENTCART_RETURNS_URL: ${AGENTCART_RETURNS_URL:-${WOO_PUBLIC_URL:-http://localhost:8098}/returns}
      AGENTCART_SUBSTITUTION_POLICY: ${AGENTCART_SUBSTITUTION_POLICY:-approval_required}
      AGENTCART_CANCELLATION_WINDOW_MINUTES: ${AGENTCART_CANCELLATION_WINDOW_MINUTES:-30}
      AGENTCART_TEMPO_NETWORK: ${AGENTCART_TEMPO_MPP_NETWORK:-testnet}
      AGENTCART_TEMPO_RECIPIENT_ADDRESS: ${AGENTCART_TEMPO_RECIPIENT_ADDRESS:-}
      AGENTCART_STRIPE_PROFILE_ID: ${AGENTCART_STRIPE_PROFILE_ID:-}
      AGENTCART_PAYMENT_VERIFIER_URL: ${AGENTCART_PAYMENT_VERIFIER_URL:-}
      AGENTCART_PAYMENT_VERIFIER_TOKEN: ${AGENTCART_PAYMENT_VERIFIER_TOKEN:-}
      AGENTCART_CHECKOUT_MODE: ${AGENTCART_CHECKOUT_MODE:-trusted_token_or_verifier}
      AGENTCART_SIGNED_REQUEST_MODE: ${AGENTCART_SIGNED_REQUEST_MODE:-off}
      AGENTCART_SIGNED_REQUEST_SECRET: ${AGENTCART_SIGNED_REQUEST_SECRET:-}
      AGENTCART_SIGNED_REQUEST_PUBLIC_KEY: ${AGENTCART_SIGNED_REQUEST_PUBLIC_KEY:-}
    volumes:
      - woocommerce_data:/var/www/html
      - ../../woocommerce-shopbridge/agentcart-shopbridge:/var/www/html/wp-content/plugins/agentcart-shopbridge:ro

  woocommerce-seed:
    image: wordpress:cli-php8.2
    profiles: ["woocommerce-demo"]
    user: "0:0"
    depends_on:
      - woocommerce
      - woocommerce-db
    environment:
      WORDPRESS_DB_HOST: woocommerce-db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WOO_DB_PASSWORD:?set WOO_DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
      WOO_PUBLIC_URL: ${WOO_PUBLIC_URL:-http://localhost:8098}
      WOO_ADMIN_USER: ${WOO_ADMIN_USER:-agentcart}
      WOO_ADMIN_PASSWORD: ${WOO_ADMIN_PASSWORD:?set WOO_ADMIN_PASSWORD}
      WOO_ADMIN_EMAIL: ${WOO_ADMIN_EMAIL:-merchant@example.com}
      AGENTCART_SHOPBRIDGE_TOKEN: ${WOOCOMMERCE_AGENTCART_TOKEN:?set WOOCOMMERCE_AGENTCART_TOKEN}
    volumes:
      - woocommerce_data:/var/www/html
      - ../../woocommerce-shopbridge/agentcart-shopbridge:/var/www/html/wp-content/plugins/agentcart-shopbridge:ro
      - ../../demo/woocommerce/seed-products.sh:/seed-products.sh:ro
    entrypoint: ["bash", "/seed-products.sh"]

volumes:
  agentcart_data:
  household_os_data:
  vikunja_db:
  vikunja_files:
  homeassistant_config:
  woocommerce_db:
  woocommerce_data:
