version: "2.4"

services:
  vikunja-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vikunja_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  vikunja:
    image: vikunja/vikunja:2.3.0
    restart: unless-stopped
    depends_on:
      vikunja-db:
        condition: service_healthy
    ports:
      - "${VIKUNJA_HOST_BIND:-0.0.0.0}:${VIKUNJA_HOST_PORT:-3456}:3456"
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET}
      VIKUNJA_SERVICE_TIMEZONE: ${VIKUNJA_SERVICE_TIMEZONE:-Europe/Berlin}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: ${VIKUNJA_SERVICE_ENABLEREGISTRATION:-false}
      VIKUNJA_SERVICE_ENABLELINKSHARING: ${VIKUNJA_SERVICE_ENABLELINKSHARING:-false}
      VIKUNJA_SERVICE_ENABLETASKCOMMENTS: ${VIKUNJA_SERVICE_ENABLETASKCOMMENTS:-true}
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: vikunja-db
      VIKUNJA_DATABASE_DATABASE: ${POSTGRES_DB}
      VIKUNJA_DATABASE_USER: ${POSTGRES_USER}
      VIKUNJA_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vikunja_files:/app/vikunja/files

  household-os:
    build: .
    restart: unless-stopped
    depends_on:
      - vikunja
    ports:
      - "${HOUSEHOLD_OS_HOST_BIND:-0.0.0.0}:${HOUSEHOLD_OS_HOST_PORT:-8088}:8088"
    environment:
      HOUSEHOLD_OS_BIND: 0.0.0.0
      HOUSEHOLD_OS_PORT: 8088
      HOUSEHOLD_OS_TIMEZONE: ${HOUSEHOLD_OS_TIMEZONE:-Europe/Berlin}
      HOUSEHOLD_OS_TOKEN: ${HOUSEHOLD_OS_TOKEN}
      AUDIT_LOG_PATH: /data/audit.jsonl
      CHAT_HISTORY_PATH: /data/chat.jsonl
      SESSION_PATH: /data/sessions.json
      VIKUNJA_API_URL: http://vikunja:3456/api/v1
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL}
      VIKUNJA_WEB_URL: ${VIKUNJA_WEB_URL:-}
      VIKUNJA_TOKEN: ${VIKUNJA_TOKEN}
      HOMEASSISTANT_URL: ${HOMEASSISTANT_URL}
      HOMEASSISTANT_TOKEN: ${HOMEASSISTANT_TOKEN}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      AGENTCART_URL: ${AGENTCART_URL:-}
      AGENTCART_TOKEN: ${AGENTCART_TOKEN:-}
      AGENTCART_APPROVAL_WAIT_SECONDS: ${AGENTCART_APPROVAL_WAIT_SECONDS:-180}
      HA_NOTIFY_SERVICES: ${HA_NOTIFY_SERVICES}
      HA_SHOPPING_TODO_ENTITY: ${HA_SHOPPING_TODO_ENTITY:-todo.shopping_list}
      HA_CO2_ENTITY_IDS: ${HA_CO2_ENTITY_IDS}
      HA_WINDOW_ENTITY_IDS: ${HA_WINDOW_ENTITY_IDS}
      HA_CO2_THRESHOLD_PPM: ${HA_CO2_THRESHOLD_PPM:-1000}
      HA_ALLOWED_SCRIPT_IDS: ${HA_ALLOWED_SCRIPT_IDS}
      CYCLE_CALENDAR_ENABLED: ${CYCLE_CALENDAR_ENABLED:-false}
      CYCLE_CALENDAR_TOKEN: ${CYCLE_CALENDAR_TOKEN:-}
      CYCLE_CALENDAR_START_DATE: ${CYCLE_CALENDAR_START_DATE:-}
      CYCLE_CALENDAR_LENGTH_DAYS: ${CYCLE_CALENDAR_LENGTH_DAYS:-28}
      CYCLE_CALENDAR_PERIOD_DAYS: ${CYCLE_CALENDAR_PERIOD_DAYS:-5}
      CYCLE_CALENDAR_MONTHS_AHEAD: ${CYCLE_CALENDAR_MONTHS_AHEAD:-6}
      TASK_CALENDAR_ENABLED: ${TASK_CALENDAR_ENABLED:-false}
      TASK_CALENDAR_TOKEN: ${TASK_CALENDAR_TOKEN:-}
      TASK_CALENDAR_DAYS_PAST: ${TASK_CALENDAR_DAYS_PAST:-14}
      TASK_CALENDAR_DAYS_AHEAD: ${TASK_CALENDAR_DAYS_AHEAD:-180}
      TASK_CALENDAR_EVENT_MINUTES: ${TASK_CALENDAR_EVENT_MINUTES:-30}
    volumes:
      - household_os_data:/data

volumes:
  vikunja_db:
  vikunja_files:
  household_os_data:
