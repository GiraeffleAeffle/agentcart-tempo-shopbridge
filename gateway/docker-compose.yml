version: "2.4"

services:
  agentcart:
    build: .
    restart: unless-stopped
    ports:
      - "${AGENTCART_HOST_BIND:-0.0.0.0}:${AGENTCART_HOST_PORT:-8099}:8099"
    environment:
      AGENTCART_BIND: 0.0.0.0
      AGENTCART_PORT: 8099
      AGENTCART_PUBLIC_URL: ${AGENTCART_PUBLIC_URL}
      AGENTCART_TIMEZONE: ${AGENTCART_TIMEZONE:-Europe/Berlin}
      AGENTCART_TOKEN: ${AGENTCART_TOKEN}
      AGENTCART_DATA_DIR: /data
      AGENTCART_POLICY_PATH: ${AGENTCART_POLICY_PATH:-/app/config/household_policy.example.json}
      AGENTCART_DEFAULT_SHIP_COUNTRY: ${AGENTCART_DEFAULT_SHIP_COUNTRY:-DE}
      AGENTCART_DEFAULT_SHIP_POSTAL_CODE: ${AGENTCART_DEFAULT_SHIP_POSTAL_CODE:-15344}
      WOOCOMMERCE_MODE: ${WOOCOMMERCE_MODE:-mock}
      WOOCOMMERCE_BASE_URL: ${WOOCOMMERCE_BASE_URL:-}
      WOOCOMMERCE_CONSUMER_KEY: ${WOOCOMMERCE_CONSUMER_KEY:-}
      WOOCOMMERCE_CONSUMER_SECRET: ${WOOCOMMERCE_CONSUMER_SECRET:-}
      WOOCOMMERCE_AGENTCART_TOKEN: ${WOOCOMMERCE_AGENTCART_TOKEN:-}
      WOOCOMMERCE_MERCHANT_ID: ${WOOCOMMERCE_MERCHANT_ID:-woocommerce-demo-tea}
      WOOCOMMERCE_MERCHANT_NAME: ${WOOCOMMERCE_MERCHANT_NAME:-Woo Demo Tea Shop}
      HOMEASSISTANT_URL: ${HOMEASSISTANT_URL:-}
      HOMEASSISTANT_TOKEN: ${HOMEASSISTANT_TOKEN:-}
      HA_NOTIFY_SERVICES: ${HA_NOTIFY_SERVICES:-}
      VIKUNJA_API_URL: ${VIKUNJA_API_URL:-}
      VIKUNJA_WEB_URL: ${VIKUNJA_WEB_URL:-}
      VIKUNJA_TOKEN: ${VIKUNJA_TOKEN:-}
      VIKUNJA_PROJECT_ID: ${VIKUNJA_PROJECT_ID:-}
    volumes:
      - agentcart_data:/data

volumes:
  agentcart_data:
