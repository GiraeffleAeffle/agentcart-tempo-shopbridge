name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            gateway/package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install release Node dependencies
        run: npm ci

      - name: Install gateway Node dependencies
        working-directory: gateway
        run: npm ci

      - name: Install WordPress coding standards tooling
        working-directory: woocommerce-shopbridge
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run verification pipeline
        env:
          AGENTCART_WORDPRESS_OFFICIAL_TOOLS_REQUIRED: "1"
          AGENTCART_WORDPRESS_PLUGIN_CHECK_COMMAND: scripts/run-wordpress-plugin-check.sh
        run: bash scripts/verify.sh

      - name: Publish semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTCART_RELEASE_SIGNING_KEY: ${{ secrets.AGENTCART_RELEASE_SIGNING_KEY }}
          AGENTCART_RELEASE_SIGNING_KEY_ID: ${{ vars.AGENTCART_RELEASE_SIGNING_KEY_ID }}
        run: npm run release
