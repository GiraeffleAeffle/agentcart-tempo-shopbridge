name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gateway/package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install gateway Node dependencies
        working-directory: gateway
        run: npm ci

      - name: Audit gateway Node dependencies
        working-directory: gateway
        run: npm audit --audit-level=high

      - name: Run verification pipeline
        run: bash scripts/verify.sh
